<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoLog — Car Garage Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="header-tag">Garage Management System</div>
      <h1>AUTO<span>LOG</span></h1>
      <div class="header-line"></div>
    </header>

    <div class="add-form">
      <div class="form-title">Register New Vehicle</div>
      <div class="form-row">
        <div class="field">
          <label>Make</label>
          <input type="text" id="make" placeholder="e.g. Ferrari">
        </div>
        <div class="field">
          <label>Model</label>
          <input type="text" id="model" placeholder="e.g. 488 GTB">
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Year</label>
          <input type="number" id="year" placeholder="e.g. 2023" min="1886" max="2099">
        </div>
        <div class="field">
          <label>Type</label>
          <select id="type">
            <option value="🏎️">Sports Car</option>
            <option value="🚗">Sedan</option>
            <option value="🚙">SUV</option>
            <option value="🛻">Truck</option>
            <option value="🏍️">Motorcycle</option>
            <option value="⚡">Electric</option>
            <option value="🚐">Van</option>
          </select>
        </div>
      </div>
      <button class="btn-add" onclick="addCar()">ADD TO GARAGE</button>
    </div>

    <div class="garage-header">
      <div class="garage-title">YOUR GARAGE</div>
      <div class="count-badge" id="count-badge">0 VEHICLES</div>
    </div>

    <div class="car-list" id="car-list"></div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-title">EDIT VEHICLE</div>
      <div class="form-row">
        <div class="field">
          <label>Make</label>
          <input type="text" id="edit-make">
        </div>
        <div class="field">
          <label>Model</label>
          <input type="text" id="edit-model">
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>Year</label>
          <input type="number" id="edit-year">
        </div>
        <div class="field">
          <label>Type</label>
          <select id="edit-type">
            <option value="🏎️">Sports Car</option>
            <option value="🚗">Sedan</option>
            <option value="🚙">SUV</option>
            <option value="🛻">Truck</option>
            <option value="🏍️">Motorcycle</option>
            <option value="⚡">Electric</option>
            <option value="🚐">Van</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-save" onclick="saveEdit()">SAVE CHANGES</button>
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <footer>AutoLog v1.0 — All Systems Nominal</footer>

  <script>
    let cars = [];
    let editId = null;

    function addCar() {
      const make = document.getElementById('make').value.trim();
      const model = document.getElementById('model').value.trim();
      const year = document.getElementById('year').value.trim();
      const type = document.getElementById('type').value;

      if (!make || !model) {
        document.getElementById('make').focus();
        return;
      }

      cars.push({ id: Date.now(), make, model, year: year || '—', type });
      document.getElementById('make').value = '';
      document.getElementById('model').value = '';
      document.getElementById('year').value = '';
      render();
    }

    function deleteCar(id) {
      cars = cars.filter(c => c.id !== id);
      render();
    }

    function openEdit(id) {
      const car = cars.find(c => c.id === id);
      if (!car) return;
      editId = id;
      document.getElementById('edit-make').value = car.make;
      document.getElementById('edit-model').value = car.model;
      document.getElementById('edit-year').value = car.year === '—' ? '' : car.year;
      document.getElementById('edit-type').value = car.type;
      document.getElementById('modal').classList.add('open');
    }

    function saveEdit() {
      const car = cars.find(c => c.id === editId);
      if (!car) return;
      car.make = document.getElementById('edit-make').value.trim() || car.make;
      car.model = document.getElementById('edit-model').value.trim() || car.model;
      car.year = document.getElementById('edit-year').value.trim() || '—';
      car.type = document.getElementById('edit-type').value;
      closeModal();
      render();
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      editId = null;
    }

    function render() {
      const list = document.getElementById('car-list');
      const badge = document.getElementById('count-badge');
      badge.textContent = `${cars.length} VEHICLE${cars.length !== 1 ? 'S' : ''}`;

      if (cars.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">🚗</div>
            <div class="empty-text">No vehicles registered</div>
          </div>`;
        return;
      }

      list.innerHTML = cars.map(car => `
        <div class="car-item">
          <div class="car-icon">${car.type}</div>
          <div class="car-info">
            <div class="car-name">${car.make} ${car.model}</div>
            <div class="car-meta">Year: <span>${car.year}</span></div>
          </div>
          <div class="car-actions">
            <button class="btn-edit" onclick="openEdit(${car.id})">Edit</button>
            <button class="btn-delete" onclick="deleteCar(${car.id})">Remove</button>
          </div>
        </div>`).join('');
    }

    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !document.getElementById('modal').classList.contains('open')) {
        addCar();
      }
    });

    render();
  </script>
</body>
</html>
